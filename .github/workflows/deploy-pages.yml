name: Deploy Static Site to Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare public artifact
        run: |
          mkdir -p _site/assets
          cp index.html _site/
          cp index.en.html _site/
          cp index.lt.html _site/
          cp PA-Premium-Icon.png _site/
          cp main_photo-640.jpg _site/
          cp main_photo-1024.jpg _site/
          cp main_photo-1536.jpg _site/
          cp -r assets/. _site/assets/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
